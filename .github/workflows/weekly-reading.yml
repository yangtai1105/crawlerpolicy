name: Weekly Critical Reading

on:
  schedule:
    - cron: "0 13 * * 1"   # Mondays at 13:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: weekly-reading
  cancel-in-progress: false

jobs:
  reading:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install Python
        run: uv python install 3.12

      - name: Sync deps
        run: uv sync --frozen

      - name: Build critical reading
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python -m pipeline.critical_reading

      - name: Commit + push if changed
        run: |
          git config user.name "ai-ecosystem-tracker[bot]"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "weekly-reading $(date -u +%G-W%V): auto-run"
            git push origin HEAD:${{ github.ref_name }}
          fi
