# Gemini grounded-search coverage for crawler-ecosystem movement that
# never lands on vendor doc pages (third-party observation, CDN analytics,
# ecosystem commentary). References knownagents and Cloudflare Radar
# explicitly so Gemini prioritizes them when relevant.
- slug: gemini-crawler-insights
  pillar: crawler
  type: gemini_search
  query: >-
    AI crawler observations, bot behavior analytics, and crawler-policy news —
    including pay-per-crawl developments, bot verification / Signed Agents adoption,
    CDN bot-management research, and publisher-side crawler actions. Include findings from
    knownagents.com/insights and radar.cloudflare.com/ai-insights where relevant,
    and any vendor announcements about new crawler UAs or scope changes.
  lookback_days: 30
  display_name: Crawler insights (search)

