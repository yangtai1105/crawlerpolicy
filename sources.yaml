# ─── Gemini grounded-search discovery (one call/day per query) ───
# Each of these runs once per day, returns the top grounded search results
# as candidate items. Covers territory that's hard to track via fixed URLs
# (news across many outlets, regulator actions not in any single feed,
# emerging agent/standards movement).

- slug: gemini-ai-licensing-deals
  pillar: ecosystem
  type: gemini_search
  query: "New AI training data licensing deals, content partnerships, or lawsuits between AI companies and publishers, rights holders, or platforms"
  lookback_days: 14
  display_name: AI licensing & training deals (search)

- slug: gemini-content-blocking
  pillar: ecosystem
  type: gemini_search
  query: "New tools, policies, or announcements for publishers to block, charge, or control AI crawlers (e.g. robots.txt changes, paywalls for AI training, pay-per-crawl, content authenticity / provenance)"
  lookback_days: 14
  display_name: Content-blocking & pay-for-content (search)

- slug: gemini-regulator-ai-content
  pillar: ecosystem
  type: gemini_search
  query: "Regulatory action from UK CMA, EU Commission, EU AI Office, Italian Garante, US FTC, or US Copyright Office specifically concerning AI training data, AI crawlers, content licensing, or generative AI and copyright"
  lookback_days: 30
  display_name: Regulator action on AI content (search)

- slug: gemini-agent-standards
  pillar: agent
  type: gemini_search
  query: "New or updated IETF drafts, W3C proposals, or standards-body activity on AI agent authentication, web bot auth, agents.txt, llms.txt, or agent identity"
  lookback_days: 30
  display_name: Agent & bot-auth standards (search)

- slug: gemini-agent-infra
  pillar: agent
  type: gemini_search
  query: "New features, integrations, or announcements from AI agent infrastructure vendors (Browserbase, Stagehand, LangChain agents, CrewAI, AutoGen, Anthropic Computer Use, OpenAI Operator, Google Agent Development Kit) — focus on protocol and bot-identity features"
  lookback_days: 14
  display_name: Agent infrastructure movement (search)
